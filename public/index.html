<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Дордой</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Страницы -->
    <div id="page-home" class="page"><h1>Главная</h1><div class="report-card">Добро пожаловать в систему учета.</div></div>
    
    <div id="page-reports" class="page" style="display: none;">
        <h1>Продажи</h1>
        <div class="report-card">
            <input type="text" id="item-name" placeholder="Товар">
            <input type="number" id="item-count" placeholder="Кол-во">
            <button class="btn-add" onclick="addItem()">Добавить</button>
        </div>
        <div id="items-list"></div>
    </div>

    <div id="page-stock" class="page" style="display: none;">
        <h1>Склад</h1>
        <div class="report-card">
            <input type="text" id="stock-name" placeholder="Товар">
            <input type="number" id="stock-count" placeholder="Кол-во">
            <button class="btn-add" onclick="addToStock()">Добавить</button>
        </div>
        <div id="stock-list"></div>
    </div>

    <div id="page-profile" class="page" style="display: none;"><h1>Профиль</h1><div class="profile-card"><h2 id="user-name">Пользователь</h2></div></div>

    <!-- Меню -->
    <div class="navbar">
        <div class="nav-item" onclick="showPage('home', this)"><span>Главная</span></div>
        <div class="nav-item" onclick="showPage('reports', this)"><span>Продажи</span></div>
        <div class="nav-item" onclick="showPage('stock', this)"><span>Склад</span></div>
        <div class="nav-item" onclick="showPage('profile', this)"><span>Профиль</span></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Списки товаров
        let sales = [];
        let stocks = [];

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + id).style.display = 'block';
        }

        function addItem() {
            let n = document.getElementById('item-name').value;
            let c = document.getElementById('item-count').value;
            if (n && c) {
                sales.push({n, c});
                render();
            }
        }

        function addToStock() {
            let n = document.getElementById('stock-name').value;
            let c = document.getElementById('stock-count').value;
            if (n && c) {
                stocks.push({n, c});
                render();
            }
        }

        function render() {
            let list = document.getElementById('items-list');
            list.innerHTML = '';
            sales.forEach((item, i) => {
                list.innerHTML += `<div class="report-card">${item.n}: ${item.c} шт. 
                <button onclick="sales.splice(${i},1); render()">Удалить</button></div>`;
            });

            let sList = document.getElementById('stock-list');
            sList.innerHTML = '';
            stocks.forEach((item, i) => {
                sList.innerHTML += `<div class="report-card">${item.n}: ${item.c} шт. 
                <button onclick="stocks.splice(${i},1); render()">Удалить</button></div>`;
            });
        }
    </script>
</body>
</html>
