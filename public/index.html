<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет отчетов</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Главная страница -->
    <div id="page-home" class="page">
        <h1>Главная</h1>
        <div class="report-card">
            <h3>Добро пожаловать!</h3>
            <p>Здесь будут отображаться оперативные данные и уведомления.</p>
        </div>
    </div>

    <!-- Страница Отчетов -->
    <div id="page-reports" class="page" style="display: none;">
        <h1>Мои отчеты</h1>
        <div id="reports-container">
            <div class="report-card">
                <h3>Отчет №1</h3>
                <p>Дата: 20.07.2026 | Статус: Выполнено</p>
            </div>
        </div>
        <button class="btn-add" onclick="alert('Добавление отчета...')">Добавить отчет</button>
    </div>

    <!-- Страница Профиля -->
    <div id="page-profile" class="page" style="display: none;">
        <h1>Профиль</h1>
        <div class="profile-card">
            <div class="avatar"><i class="ri-user-line"></i></div>
            <h2 id="user-name">Загрузка...</h2>
            <p>Роль: Активный участник</p>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <p>Отчетов</p>
                <h3>12</h3>
            </div>
            <div class="stat-item">
                <p>Эффективность</p>
                <h3>95%</h3>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <div class="navbar">
        <div class="nav-item active" onclick="showPage('home')">
            <i class="ri-home-5-line"></i><span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('reports')">
            <i class="ri-file-list-3-line"></i><span>Отчеты</span>
        </div>
        <div class="nav-item" onclick="showPage('profile')">
            <i class="ri-user-3-line"></i><span>Профиль</span>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Подтянем имя из Telegram
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
        }

        // Функция переключения страниц
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + pageId).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
