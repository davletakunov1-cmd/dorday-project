<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Дордой</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Главная -->
    <div id="page-home" class="page">
        <h1>Дордой Учет</h1>
        <div class="report-card">
            <h3>Добро пожаловать!</h3>
            <p>Управляйте продажами и складом в одном приложении.</p>
        </div>
    </div>

    <!-- Отчеты (Продажи) -->
    <div id="page-reports" class="page" style="display: none;">
        <h1>Учет продаж</h1>
        <div class="report-card">
            <input type="text" id="item-name" placeholder="Название товара">
            <input type="number" id="item-count" placeholder="Кол-во продаж">
            <button class="btn-add" onclick="addItem()">Добавить продажу</button>
        </div>
        <div id="items-list"></div>
    </div>

    <!-- Склад -->
    <div id="page-stock" class="page" style="display: none;">
        <h1>Склад</h1>
        <div class="report-card">
            <input type="text" id="stock-name" placeholder="Название товара">
            <input type="number" id="stock-count" placeholder="Количество на складе">
            <button class="btn-add" onclick="addToStock()">Добавить на склад</button>
        </div>
        <div id="stock-list"></div>
    </div>

    <!-- Профиль -->
    <div id="page-profile" class="page" style="display: none;">
        <h1>Профиль</h1>
        <div class="profile-card">
            <div class="avatar"><i class="ri-user-line"></i></div>
            <h2 id="user-name">Загрузка...</h2>
            <p>Роль: Продавец Дордой</p>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <p>Всего продаж</p>
                <h3 id="total-sales">0</h3>
            </div>
            <div class="stat-item">
                <p>Хит продаж</p>
                <h3 id="top-item">-</h3>
            </div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="navbar">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="ri-home-5-line"></i><span>Главная</span></div>
        <div class="nav-item" onclick="showPage('reports', this)"><i class="ri-file-list-3-line"></i><span>Отчеты</span></div>
        <div class="nav-item" onclick="showPage('stock', this)"><i class="ri-archive-line"></i><span>Склад</span></div>
        <div class="nav-item" onclick="showPage('profile', this)"><i class="ri-user-3-line"></i><span>Профиль</span></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;
        if (user) document.getElementById('user-name').innerText = user.first_name;

        let salesData = [];

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + pageId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // --- ЛОГИКА ПРОДАЖ ---
        function addItem() {
            const name = document.getElementById('item-name').value;
            const count = parseInt(document.getElementById('item-count').value);
            if (name && count) {
                salesData.push({ name, count });
                updateList();
                document.getElementById('item-name').value = '';
                document.getElementById('item-count').value = '';
            }
        }

        function updateList() {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            salesData.sort((a, b) => b.count - a.count);
            let total = 0;
            salesData.forEach((item, index) => {
                total += item.count;
                list.innerHTML += `
                    <div class="report-card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div><strong>${item.name}</strong><br><small>${item.count} шт.</small></div>
                            <div>
                                <button class="btn-icon" onclick="editItem(${index})"><i class="ri-pencil-line"></i></button>
                                <button class="btn-icon delete" onclick="deleteItem(${index})"><i class="ri-delete-bin-line"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('total-sales').innerText = total;
            document.getElementById('top-item').innerText = salesData.length > 0 ? salesData[0].name : '-';
        }

        function deleteItem(index) {
            if(confirm('Удалить эту запись?')) {
                salesData.splice(index, 1);
                updateList();
            }
        }

        function editItem(index) {
            const newName = prompt('Изменить название:', salesData[index].name);
            const newCount = prompt('Изменить количество:', salesData[index].count);
            if (newName && newCount) {
                salesData[index] = { name: newName, count: parseInt(newCount) };
                updateList();
            }
        }

        // --- ЛОГИКА СКЛАДА ---
        function addToStock() {
            const name = document.getElementById('stock-name').value;
            const count = document.getElementById('stock-count').value;
            if (name && count) {
                document.getElementById('stock-list').innerHTML += `
                    <div class="report-card">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${name}</strong><span>${count} шт.</span>
                        </div>
                    </div>`;
                document.getElementById('stock-name').value = '';
                document.getElementById('stock-count').value = '';
            }
        }
    </script>
</body>
</html>
