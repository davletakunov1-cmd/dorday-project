<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет отчетов</title>
    <!-- Подключаем внешний файл стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Мои отчеты</h1>

    <!-- Контейнер для списка отчетов -->
    <div id="reports-container">
        <div class="report-card">
            <h3>Отчет №1</h3>
            <p>Дата: 20.07.2026</p>
            <p>Статус: Выполнено</p>
        </div>

        <div class="report-card">
            <h3>Отчет №2</h3>
            <p>Дата: 19.07.2026</p>
            <p>Статус: В обработке</p>
        </div>
    </div>

    <!-- Кнопка добавления -->
    <button class="btn-add" onclick="alert('Функция добавления отчета будет готова скоро!')">
        Добавить отчет
    </button>

    <!-- Подключаем Telegram Web App SDK, чтобы сайт знал, что он внутри Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран
    </script>
</body>
</html>
