<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Дордой</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app">
        <!-- Главная -->
        <section id="page-home" class="page">
            <h1>Дордой Учет</h1>
            <div class="report-card">
                <h3>Добро пожаловать!</h3>
                <p>Ваша система учета остатков и продаж.</p>
            </div>
        </section>
        
        <!-- Продажи -->
        <section id="page-reports" class="page" style="display: none;">
            <h1>Продажи</h1>
            <div class="report-card">
                <input type="text" id="sales-name" placeholder="Название товара">
                <input type="number" id="sales-count" placeholder="Количество">
                <button class="btn-add" onclick="App.add('sales')">Добавить продажу</button>
            </div>
            <div id="sales-list" class="list-container"></div>
        </section>

        <!-- Склад -->
        <section id="page-stock" class="page" style="display: none;">
            <h1>Склад</h1>
            <div class="report-card">
                <input type="text" id="stock-name" placeholder="Название товара">
                <input type="number" id="stock-count" placeholder="Количество">
                <button class="btn-add" onclick="App.add('stock')">Добавить на склад</button>
            </div>
            <div id="stock-list" class="list-container"></div>
        </section>
    </main>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-item active" onclick="App.navigate('home', this)"><i class="ri-home-5-line"></i><span>Главная</span></div>
        <div class="nav-item" onclick="App.navigate('reports', this)"><i class="ri-file-list-3-line"></i><span>Продажи</span></div>
        <div class="nav-item" onclick="App.navigate('stock', this)"><i class="ri-archive-line"></i><span>Склад</span></div>
    </nav>

    <script>
        const App = {
            // Инициализация данных из localStorage
            data: {
                sales: JSON.parse(localStorage.getItem('sales')) || [],
                stock: JSON.parse(localStorage.getItem('stock')) || []
            },

            navigate(id, el) {
                document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
                document.getElementById(`page-${id}`).style.display = 'block';
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            },

            save() {
                localStorage.setItem('sales', JSON.stringify(this.data.sales));
                localStorage.setItem('stock', JSON.stringify(this.data.stock));
            },

            add(type) {
                const nameInput = document.getElementById(`${type}-name`);
                const countInput = document.getElementById(`${type}-count`);
                
                if (!nameInput.value || !countInput.value) return;
                
                this.data[type].push({ 
                    id: Date.now(), 
                    name: nameInput.value, 
                    count: countInput.value 
                });
                
                nameInput.value = '';
                countInput.value = '';
                this.save();
                this.render(type);
            },

            remove(type, id) {
                this.data[type] = this.data[type].filter(item => item.id !== id);
                this.save();
                this.render(type);
            },

            render(type) {
                const container = document.getElementById(`${type}-list`);
                container.innerHTML = this.data[type].map(item => `
                    <div class="report-card row">
                        <div><strong>${item.name}</strong><br><small>${item.count} шт.</small></div>
                        <button class="btn-icon" onclick="App.remove('${type}', ${item.id})">
                            <i class="ri-delete-bin-line"></i>
                        </button>
                    </div>
                `).join('');
            },

            init() {
                this.render('sales');
                this.render('stock');
            }
        };

        // Запуск приложения
        App.init();
    </script>
</body>
</html>
