<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет отчетов</title>
    <!-- Библиотека иконок -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Подключение файла стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Мои отчеты</h1>

    <!-- Контейнер для списка отчетов -->
    <div id="reports-container">
        <div class="report-card">
            <h3>Отчет №1</h3>
            <p>Дата: 20.07.2026 | Статус: Выполнено</p>
        </div>

        <div class="report-card">
            <h3>Отчет №2</h3>
            <p>Дата: 19.07.2026 | Статус: В обработке</p>
        </div>
    </div>

    <!-- Кнопка -->
    <button class="btn-add" onclick="alert('Скоро...')">
        Добавить отчет
    </button>

    <!-- Нижняя навигация -->
    <div class="navbar">
        <div class="nav-item active">
            <i class="ri-home-5-line"></i>
            <span>Главная</span>
        </div>
        <div class="nav-item">
            <i class="ri-file-list-3-line"></i>
            <span>Отчеты</span>
        </div>
        <div class="nav-item">
            <i class="ri-user-3-line"></i>
            <span>Профиль</span>
        </div>
    </div>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Логика переключения активного пункта меню
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
